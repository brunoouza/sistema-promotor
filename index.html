<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Sistema Promotor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            text-align: center;
        }
        .logo {
            font-size: 56px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 28px;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        h1 span { color: #2563eb; }
        p {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .btn {
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: block;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        .btn-admin {
            background: #2563eb;
            color: white;
        }
        .btn-app {
            background: #22c55e;
            color: white;
        }
        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #94a3b8;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .badge {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1><span>Sistema</span> Promotor</h1>
        <div class="badge">🔄 Versão 1.0</div>
        <p>Escolha qual sistema deseja acessar</p>
        
        <div class="btn-group">
            <a href="admin.html" class="btn btn-admin">👔 Painel Administrativo</a>
            <a href="app.html" class="btn btn-app">📱 App do Promotor</a>
        </div>
        
        <div class="footer">
            Desenvolvido com ❤️ • Hospedado no Cloudflare Pages
        </div>
    </div>
</body>
</html>
